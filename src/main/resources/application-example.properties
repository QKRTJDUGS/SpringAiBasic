spring.application.name=SpringAiBasic

# ===== Oracle 데이터베이스 접속 =====
# 아래 username/password를 본인 환경에 맞게 바꾼 뒤,
# 이 파일을 application.properties 로 복사해서 사용하세요.
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:data16
spring.datasource.username=your_username
spring.datasource.password=your_password

# ===== MyBatis 설정 =====
mybatis.type-aliases-package=kopo.poly.dto
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:mapper/*.xml
